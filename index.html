function loadData() {
  try {
    const raw = localStorage.getItem(SK);
    const d = raw ? JSON.parse(raw) : {games:[],lots:[]};
    let changed = false;
    for (const sl of SEED_LOTS) {
      if (!d.lots.find(l => l.id === sl.id)) {
        d.lots.unshift(sl);
        d.games.unshift(...SEED_GAMES.filter(g => g.lotId === sl.id));
        changed = true;
      }
    }
    if (changed) localStorage.setItem(SK, JSON.stringify(d));
    return d;
  } catch(e) {
    return {games:[...SEED_GAMES], lots:[...SEED_LOTS]};
  }
}
function saveData(d) { try { localStorage.setItem(SK, JSON.stringify(d)); } catch(e) {} }

/* ─── UPC Lookup ─── */
async function upcLookup(code) {
  try {
    const r = await fetch('https://api.upcitemdb.com/prod/trial/lookup?upc=' + code, {signal:AbortSignal.timeout(5000)});
    if (r.ok) {
      const d = await r.json();
      if (d.items && d.items[0] && d.items[0].title) {
        const i = d.items[0];
        return {title:i.title, platform:detectPlat(i.title), image:(i.images&&i.images[0])||''};
      }
    }
  } catch(e) {}
  return null;
}

/* ─── Game Search Autocomplete (RAWG API) ─── */
// Mapping plateformes RAWG → noms app
const RAWG_PLAT_MAP = {
  4:'PC', 187:'PS5', 18:'PS4', 16:'PS3', 15:'PS2', 6:'Xbox 360',
  1:'Xbox One', 186:'Xbox Series', 7:'Switch', 8:'DS', 9:'3DS',
  11:'Wii', 105:'Wii U', 21:'Wii', 10:'Wii'
};
function rawgPlatform(platforms) {
  if(!platforms||!platforms.length) return '';
  for(const p of platforms) {
    const mapped = RAWG_PLAT_MAP[p.platform && p.platform.id];
    if(mapped) return mapped;
  }
  return '';
}

function getRawgKey() { return localStorage.getItem('rawg-key')||''; }

async function searchGames(query) {
  if(!query || query.length < 2) return [];
  const key = getRawgKey();
  if(!key) return [];
  try {
    const url = 'https://api.rawg.io/api/games?search=' + encodeURIComponent(query) + '&page_size=6&key=' + key;
    const r = await fetch(url, {signal: AbortSignal.timeout(4000)});
    if(!r.ok) return [];
    const d = await r.json();
    return (d.results||[]).map(g => ({
      title: g.name,
      platform: rawgPlatform(g.platforms),
      image: g.background_image || '',
      released: g.released ? g.released.slice(0,4) : ''
    }));
  } catch(e) { return []; }
}

function GameTitleInput({value, onChange, onSelectSuggestion}) {
  const [suggestions, setSuggestions] = useState([]);
  const [loading, setLoading] = useState(false);
  const [open, setOpen] = useState(false);
  const debounceRef = useRef(null);
  const wrapRef = useRef(null);

  useEffect(() => {
    clearTimeout(debounceRef.current);
    if(!value || value.length < 2) { setSuggestions([]); setOpen(false); return; }
    debounceRef.current = setTimeout(async () => {
      setLoading(true);
      const results = await searchGames(value);
      setSuggestions(results);
      setOpen(results.length > 0);
      setLoading(false);
    }, 400);
    return () => clearTimeout(debounceRef.current);
  }, [value]);

  // Close on outside click
  useEffect(() => {
    function handler(e) { if(wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); }
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  function select(s) {
    setOpen(false);
    setSuggestions([]);
    onSelectSuggestion(s);
  }

  return (
    <div ref={wrapRef} style={{position:'relative'}}>
      <div style={{position:'relative'}}>
        <input
          value={value}
          onChange={e => { onChange(e.target.value); }}
          onFocus={() => { if(suggestions.length>0) setOpen(true); }}
          placeholder="Ex: The Last of Us Part II"
          style={{...IS, paddingRight: loading ? 40 : 14}}
        />
        {loading && <div style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)'}}><IconLoad size={15} style={{color:C.muted,animation:'spin 1s linear infinite'}}/></div>}
      </div>
      {!getRawgKey() && value.length >= 2 && (
        <div style={{position:'absolute',top:'calc(100% + 4px)',left:0,right:0,background:C.card,border:'1px solid '+C.acc+'50',borderRadius:12,zIndex:200,padding:'12px 14px',boxShadow:'0 8px 32px rgba(0,0,0,.7)'}}>
          <div style={{fontFamily:'Outfit',fontWeight:600,fontSize:13,color:C.text,marginBottom:4}}>Autocompletion non configuree</div>
          <div style={{fontFamily:'Outfit',fontSize:12,color:C.muted,lineHeight:1.6,marginBottom:8}}>
            1. Creez un compte gratuit sur <span style={{color:C.acc}}>rawg.io/apidocs</span>{'
'}
            2. Copiez votre cle API{'
'}
            3. Collez-la ci-dessous
          </div>
          <div style={{display:'flex',gap:8}}>
            <input placeholder="Coller la cle RAWG ici..." onKeyDown={e=>{if(e.key==='Enter'&&e.target.value.trim()){localStorage.setItem('rawg-key',e.target.value.trim());setOpen(false);}}} style={{flex:1,background:C.card2,border:'1px solid '+C.border,borderRadius:8,padding:'8px 10px',color:C.text,fontFamily:'"JetBrains Mono",monospace',fontSize:12,outline:'none'}}/>
            <button onMouseDown={e=>{e.preventDefault();const inp=e.target.previousSibling;if(inp.value.trim()){localStorage.setItem('rawg-key',inp.value.trim());setOpen(false);}}} style={{background:C.acc,borderRadius:8,padding:'8px 12px',color:'#000',fontFamily:'Outfit',fontWeight:700,fontSize:12}}>OK</button>
          </div>
        </div>
      )}
      {open && suggestions.length > 0 && (
        <div style={{position:'absolute',top:'calc(100% + 4px)',left:0,right:0,background:C.card,border:'1px solid '+C.acc+'60',borderRadius:12,zIndex:200,overflow:'hidden',boxShadow:'0 8px 32px rgba(0,0,0,.7)'}}>
          {suggestions.map((s,i) => (
            <div key={i} onMouseDown={()=>select(s)} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',cursor:'pointer',borderBottom:i<suggestions.length-1?'1px solid '+C.border:'none',background:'transparent'}}
              onMouseEnter={e=>e.currentTarget.style.background=C.card2}
              onMouseLeave={e=>e.currentTarget.style.background='transparent'}
            >
              {s.image && <img src={s.image} alt="" style={{width:38,height:28,objectFit:'cover',borderRadius:5,flexShrink:0}}/>}
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontFamily:'Outfit',fontWeight:600,fontSize:13,color:C.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.title}</div>

                  {s.released && <span style={{fontFamily:'Outfit',fontSize:10,color:C.muted}}>{s.released}</span>}
                </div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ─── CSV Export ─── */
function exportCSV(games, lots) {
  const lm = {};
  lots.forEach(l => { lm[l.id] = l.name; });
  const rows = [['Titre','Plateforme','Etat','Barcode','Achat','Vente','Port','Frais%','Benefice','Statut','Lot']];
  games.forEach(g => {
    const il = !!g.lotId;
    rows.push([g.title,g.platform,g.condition,g.barcode,il?'(lot)':g.prixAchat,il?'(lot)':g.prixVente,il?'(lot)':g.fraisPort,il?'(lot)':g.tauxFrais,il?'voir lot':gP(g).toFixed(2),il?'En lot':g.status,g.lotId?lm[g.lotId]:'']);
  });
  const csv = rows.map(r => r.map(v => '"' + String(v||'').replace(/"/g,'""') + '"').join(',')).join('\n');
  const url = URL.createObjectURL(new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'}));
  const a = document.createElement('a');
  a.href = url; a.download = 'gametrack.csv'; a.click();
  URL.revokeObjectURL(url);
}

/* ─── Scanner ─── */
function Scanner({onDetect,onClose}) {
  const [st,setSt] = useState('start');
  const [manual,setManual] = useState('');
  const scanRef = useRef(null);
  const done = useRef(false);
  useEffect(() => {
    const t = setTimeout(async () => {
      try {
        const sc = new Html5Qrcode('gt-scanner', {verbose:false});
        scanRef.current = sc;
        await sc.start({facingMode:'environment'}, {fps:10, qrbox:{width:Math.min(window.innerWidth-60,280),height:110}},
          text => { if(done.current) return; done.current=true; sc.stop().catch(()=>{}).finally(()=>onDetect(text)); },
          ()=>{}
        );
        setSt('ok');
      } catch(e) { setSt('err'); }
    }, 300);
    return () => { clearTimeout(t); if(scanRef.current) scanRef.current.stop().catch(()=>{}); };
  }, []);
  const close = () => { if(scanRef.current) scanRef.current.stop().catch(()=>{}); onClose(); };
  const go = () => { if(!manual.trim()) return; if(scanRef.current) scanRef.current.stop().catch(()=>{}); onDetect(manual.trim()); };
  return (
    <div style={{position:'fixed',inset:0,background:'#000',zIndex:400,display:'flex',flexDirection:'column'}}>
      <div style={{padding:'16px 20px',display:'flex',justifyContent:'space-between',alignItems:'center',background:'rgba(10,10,15,.96)',borderBottom:'1px solid #1a1a2e',flexShrink:0}}>
        <div style={{fontFamily:'Syne,sans-serif',fontSize:20,fontWeight:800,color:C.text}}>Scanner</div>
        <button onClick={close} style={{color:C.muted,padding:6,display:'flex'}}><IconX size={22}/></button>
      </div>
      <div style={{flex:1,position:'relative',minHeight:0,background:'#111'}}>
        <div id="gt-scanner" style={{width:'100%',height:'100%'}}/>
        {st==='start' && <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'#000',zIndex:5}}><IconLoad size={40} style={{color:C.acc,animation:'spin 1s linear infinite',marginBottom:14}}/><div style={{fontFamily:'Outfit',fontSize:14,color:C.muted}}>Demarrage camera...</div></div>}
        {st==='err' && <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:32,background:'#000',zIndex:5}}><div style={{fontSize:48,marginBottom:16}}>camera</div><div style={{fontFamily:'Outfit',fontWeight:600,fontSize:16,color:C.text,textAlign:'center',marginBottom:8}}>Camera inaccessible</div><div style={{fontFamily:'Outfit',fontSize:13,color:C.muted,textAlign:'center',lineHeight:1.7}}>Autorisez la camera dans Chrome. Utilisez la saisie manuelle.</div></div>}
        {st==='ok' && <div style={{position:'absolute',bottom:14,left:0,right:0,textAlign:'center',zIndex:5,pointerEvents:'none'}}><div style={{display:'inline-block',background:'rgba(0,0,0,.65)',borderRadius:20,padding:'6px 16px',fontFamily:'Outfit',fontSize:13,color:'rgba(255,255,255,.9)'}}>Pointez le code-barre dans le cadre</div></div>}
      </div>
      <div style={{padding:'16px 20px 32px',background:'rgba(10,10,15,.98)',borderTop:'1px solid #1a1a2e',flexShrink:0}}>
        <Lbl t="SAISIE MANUELLE"/>
        <div style={{display:'flex',gap:10}}>
          <input value={manual} onChange={e=>setManual(e.target.value)} onKeyDown={e=>e.key==='Enter'&&go()} placeholder="Ex: 3307216146735" inputMode="numeric" style={{flex:1,background:'#1a1a28',border:'1px solid '+C.border,borderRadius:10,padding:'12px 14px',color:C.text,fontFamily:'"JetBrains Mono",monospace',fontSize:15,outline:'none'}}/>
          <button onClick={go} style={{background:C.acc,borderRadius:10,padding:'12px 20px',color:'#000',fontFamily:'Outfit',fontWeight:700,fontSize:15}}>OK</button>
        </div>
      </div>
    </div>
  );
}

function HomeScreen({data,navigate}) {
  const games = data.games||[], lots = data.lots||[];
  // Statuts des lots
  const soldLots = lots.filter(l => l.status==='Vendu');
  const soldLotIds = new Set(soldLots.map(l => l.id));
  const resvLots = lots.filter(l => l.status==='Reserve');
  const resvLotIds = new Set(resvLots.map(l => l.id));
  const stockLots = lots.filter(l => l.status==='En stock');
  const stockLotIds = new Set(stockLots.map(l => l.id));
  // Jeux vendus (solo + dans lot vendu)
  const soldSolo = games.filter(g => g.status==='Vendu' && !g.lotId);
  const soldInLots = games.filter(g => g.lotId && soldLotIds.has(g.lotId));
  const nbVendus = soldSolo.length + soldInLots.length;
  // En stock
  const nbStock = games.filter(g=>!g.lotId&&g.status==='En stock').length + [...stockLotIds].reduce((s,id)=>s+games.filter(g=>g.lotId===id).length,0);
  // Reservé
  const nbResv = games.filter(g=>!g.lotId&&g.status==='Reserve').length + [...resvLotIds].reduce((s,id)=>s+games.filter(g=>g.lotId===id).length,0);
  // Financier
  const totalInvesti = games.filter(g=>!g.lotId).reduce((s,g)=>s+parseFloat(g.prixAchat||0),0) + lots.reduce((s,l)=>s+parseFloat(l.prixAchat||0),0);
  const totalRevenus = soldSolo.reduce((s,g)=>s+parseFloat(g.prixVente||0),0) + soldLots.reduce((s,l)=>s+parseFloat(l.prixVente||0),0);
  const totalBenef = totalRevenus - totalInvesti;
  // Potentiel global = tous les prix de vente renseignés (lots + jeux individuels, tous statuts)
  const totalPotentiel = games.filter(g=>!g.lotId).reduce((s,g)=>s+parseFloat(g.prixVente||0),0) + lots.reduce((s,l)=>s+parseFloat(l.prixVente||0),0);
  const recent = [...games].sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)).slice(0,5);
  return (
    <div style={{paddingBottom:90}} className="su">
      <div style={{padding:'36px 20px 20px',background:'linear-gradient(170deg,'+C.card+' 0%,'+C.bg+' 100%)'}}>
        <div style={{fontFamily:'Syne,sans-serif',fontSize:30,fontWeight:800,color:C.text,letterSpacing:-.5,marginBottom:2}}>GameTrack</div>
        <div style={{fontFamily:'Outfit',fontSize:13,color:C.muted,marginBottom:16}}>Suivi revente jeux video</div>
        {/* Compteurs statuts */}
        <div style={{display:'flex',gap:8}}>
          {[{l:'En stock',v:nbStock,col:C.blue},{l:'Reserve',v:nbResv,col:C.acc},{l:'Vendus',v:nbVendus,col:C.green}].map(({l,v,col})=>(
            <div key={l} style={{flex:1,background:col+'18',border:'1px solid '+col+'40',borderRadius:12,padding:'10px 12px',textAlign:'center'}}>
              <div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:22,fontWeight:600,color:col}}>{v}</div>
              <div style={{fontFamily:'Outfit',fontSize:10,color:col+'cc',marginTop:2,fontWeight:500}}>{l}</div>
            </div>
          ))}
        </div>
      </div>
      {/* Stats financieres */}
      <div style={{padding:'12px 16px 8px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        {[{l:'INVESTI',v:fmt(totalInvesti)},{l:'REVENUS ENCAISSES',v:fmt(totalRevenus)},{l:'BENEFICE ACTUEL',v:fmt(totalBenef),col:totalBenef>=0?C.green:C.red}].map(({l,v,col})=>(
          <div key={l} style={{background:C.card2,border:'1px solid '+C.border,borderRadius:14,padding:'12px 14px'}}>
            <div style={{fontFamily:'Outfit',fontSize:9,color:C.muted,letterSpacing:.8,marginBottom:6,fontWeight:500}}>{l}</div>
            <div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:15,fontWeight:600,color:col||C.text}}>{v}</div>
          </div>
        ))}
      </div>
      {/* Potentiel global */}
      <div style={{padding:'0 16px 20px'}}>
        <div style={{background:'linear-gradient(135deg,'+C.acc+'15,'+C.acc+'05)',border:'1px solid '+C.acc+'35',borderRadius:14,padding:'13px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{fontFamily:'Outfit',fontSize:9,color:C.acc+'99',letterSpacing:.8,marginBottom:5,fontWeight:500}}>POTENTIEL GLOBAL (tous statuts)</div>
            <div style={{fontFamily:'Outfit',fontSize:11,color:C.muted}}>Prix de vente renseignes - lots + jeux individuels</div>
          </div>
          <div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:20,fontWeight:600,color:C.acc,flexShrink:0,marginLeft:12}}>{fmt(totalPotentiel)}</div>
        </div>

    </div>
  );

  const addG=()=>{updateData(Object.assign({},data,{games:games.map(g=>pickSel.includes(g.id)?Object.assign({},g,{lotId:selectedId}):g)}));setAddMode(null);setPickSel([]);};
  const togP=id=>setPickSel(prev=>prev.includes(id)?prev.filter(x=>x!==id):[...prev,id]);
  const startEdit=()=>{setEf({name:lot.name,prixAchat:lot.prixAchat||'',prixVente:lot.prixVente||'',fraisPort:lot.fraisPort||'',tauxFrais:lot.tauxFrais||'',notes:lot.notes||'',status:lot.status||'En stock'});setEditing(true);};
  const saveEdit=()=>{updateData(Object.assign({},data,{lots:lots.map(l=>l.id===selectedId?Object.assign({},l,ef):l)}));setEditing(false);};
  const upE=(k,v)=>setEf(prev=>Object.assign({},prev,{[k]:v}));
  return (
    <div style={{paddingBottom:40}} className="su">
      <div style={{padding:'28px 16px 20px',background:'linear-gradient(170deg,'+C.card+' 0%,'+C.bg+' 100%)'}}>
        <button onClick={()=>navigate('lots')} style={{display:'flex',alignItems:'center',gap:6,color:C.muted,fontFamily:'Outfit',fontSize:13,marginBottom:14}}><IconLeft size={15}/> Lots</button>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
          <div>
            <div style={{display:'inline-block',padding:'3px 10px',borderRadius:20,background:C.acc2,color:C.acc,fontFamily:'Outfit',fontSize:12,fontWeight:600,marginBottom:8}}>Lot</div>
            <div style={{fontFamily:'Syne,sans-serif',fontSize:22,fontWeight:800,color:C.text}}>{lot.name}</div>
            {lot.status && <span style={{fontSize:11,padding:'2px 8px',borderRadius:20,background:(stC[lot.status]||'#555')+'25',color:stC[lot.status]||C.muted,fontFamily:'Outfit',fontWeight:500,marginTop:6,display:'inline-block'}}>{lot.status}</span>}
          </div>
          <button onClick={startEdit} style={{background:C.card2,border:'1px solid '+C.border,borderRadius:12,padding:'8px 12px',display:'flex',alignItems:'center',gap:6,color:C.muted,fontFamily:'Outfit',fontSize:13}}><IconEdit size={14}/> Modifier</button>
        </div>
      </div>
      <div style={{padding:'0 16px'}}>
        {editing && ef && <div className="fi" style={{background:C.card2,border:'1px solid '+C.border,borderRadius:14,padding:16,marginBottom:14}}>
          <div style={{fontFamily:'Syne,sans-serif',fontSize:15,fontWeight:700,color:C.text,marginBottom:14}}>Modifier le lot</div>
          <Lbl t="NOM"/><Inp value={ef.name} onChange={v=>upE('name',v)} placeholder="Nom du lot"/><Gap h={10}/>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
            <div><Lbl t="Achat"/><Inp value={ef.prixAchat} onChange={v=>upE('prixAchat',v)} placeholder="0.00" type="number" mono={true}/></div>
            <div><Lbl t="Vente"/><Inp value={ef.prixVente} onChange={v=>upE('prixVente',v)} placeholder="0.00" type="number" mono={true}/></div>
            <div><Lbl t="Port"/><Inp value={ef.fraisPort} onChange={v=>upE('fraisPort',v)} placeholder="0.00" type="number" mono={true}/></div>
            <div><Lbl t="Frais %"/><Inp value={ef.tauxFrais} onChange={v=>upE('tauxFrais',v)} placeholder="ex:13" type="number" mono={true}/></div>
          </div>
          {(()=>{const ep=lP(ef),epc=ep>0?C.green:ep<0?C.red:C.muted;return <div style={{background:C.bg,borderRadius:10,padding:'9px 14px',display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}><span style={{fontFamily:'Outfit',fontSize:13,color:C.muted}}>Benefice</span><span style={{fontFamily:'"JetBrains Mono",monospace',fontSize:16,fontWeight:600,color:epc}}>{ep>=0?'+':''}{fmt(ep)}</span></div>})()}
          <Lbl t="STATUT"/><Sel value={ef.status} onChange={v=>upE('status',v)}><option value="En stock">En stock</option><option value="Vendu">Vendu</option><option value="Reserve">Reserve</option></Sel><Gap h={10}/>
          <Lbl t="NOTES"/><textarea value={ef.notes} onChange={e=>upE('notes',e.target.value)} placeholder="Notes..." style={{width:'100%',background:C.card,border:'1px solid '+C.border,borderRadius:10,padding:'9px 12px',color:C.text,fontFamily:'Outfit',fontSize:14,resize:'vertical',minHeight:54,outline:'none',marginBottom:12}}/>
          <div style={{display:'flex',gap:10}}>
            <button onClick={saveEdit} style={{flex:1,background:C.acc,borderRadius:10,padding:11,fontFamily:'Outfit',fontWeight:700,fontSize:14,color:'#000',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}><IconChk size={15}/> Enregistrer</button>
            <button onClick={()=>setEditing(false)} style={{background:C.card,border:'1px solid '+C.border,borderRadius:10,padding:'11px 16px',color:C.muted,fontFamily:'Outfit',fontSize:14}}>Annuler</button>
          </div>
        </div>}
        <div style={{background:'linear-gradient(135deg,'+pc+'18,'+pc+'06)',border:'1px solid '+pc+'35',borderRadius:16,padding:18,marginBottom:14}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
            {[['ACHAT LOT',fmt(lot.prixAchat)],['VENTE LOT',fmt(lot.prixVente)],['FRAIS PORT',fmt(lot.fraisPort)],['JEUX',''+lotG.length]].map(([k,v])=>(
              <div key={k}><div style={{fontFamily:'Outfit',fontSize:10,color:C.muted,letterSpacing:.5,marginBottom:4}}>{k}</div><div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:16,fontWeight:600,color:C.text}}>{v}</div></div>
            ))}
          </div>
          <div style={{borderTop:'1px solid '+pc+'30',paddingTop:14,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontFamily:'Outfit',fontSize:13,color:C.muted}}>Benefice net du lot</span>
            <span style={{fontFamily:'"JetBrains Mono",monospace',fontSize:26,fontWeight:600,color:pc}}>{p>=0?'+':''}{fmt(p)}</span>
          </div>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <div style={{fontFamily:'Syne,sans-serif',fontSize:16,fontWeight:700,color:C.text}}>Jeux ({lotG.length})</div>
          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>{setAddMode(addMode==='pick'?null:'pick');setPickSel([]);setCreating(false);}} style={{background:addMode==='pick'?C.card2:C.acc2,border:'1px solid '+(addMode==='pick'?C.border:C.acc)+'50',borderRadius:10,padding:'6px 10px',display:'flex',alignItems:'center',gap:5,fontFamily:'Outfit',fontWeight:600,fontSize:11,color:addMode==='pick'?C.muted:C.acc}}>
              {addMode==='pick'?<><IconX size={12}/> Annuler</>:<><IconUPlus size={12}/> Existant</>}
            </button>
            <button onClick={()=>{setCreating(!creating);setAddMode(null);setPickSel([]);}} style={{background:creating?C.card2:C.acc2,border:'1px solid '+(creating?C.border:C.acc)+'50',borderRadius:10,padding:'6px 10px',display:'flex',alignItems:'center',gap:5,fontFamily:'Outfit',fontWeight:600,fontSize:11,color:creating?C.muted:C.acc}}>
              {creating?<><IconX size={12}/> Annuler</>:<><IconPlus size={12}/> Nouveau</>}
            </button>
          </div>
        </div>
        {addMode==='pick' && <div className="fi" style={{background:C.card2,border:'1px solid '+C.border,borderRadius:14,padding:14,marginBottom:14}}>
          <div style={{fontFamily:'Outfit',fontSize:12,color:C.muted,marginBottom:10}}>{free.length} jeu{free.length!==1?'x':''} disponible{free.length!==1?'s':''}</div>
          <GPicker games={free} selected={pickSel} onToggle={togP}/>
          {free.length>0 && <button onClick={addG} disabled={!pickSel.length} style={{width:'100%',marginTop:12,background:pickSel.length?C.acc:'#2a2a3a',borderRadius:10,padding:11,fontFamily:'Outfit',fontWeight:700,fontSize:14,color:pickSel.length?'#000':C.muted,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
            <IconChk size={15}/> Ajouter {pickSel.length?pickSel.length+' jeu'+(pickSel.length>1?'x':''):''}
          </button>}
        </div>}
        {creating && <InlineLotGameForm onClose={()=>setCreating(false)} onSave={g=>{
          const ng=Object.assign({},g,{id:uid(),lotId:selectedId,createdAt:ts()});
          updateData(Object.assign({},data,{games:[...games,ng]}));
          setCreating(false);
        }}/>}
        {!lotG.length && !addMode && !creating && <div style={{textAlign:'center',padding:'20px 0',color:C.muted,fontFamily:'Outfit',fontSize:13,marginBottom:10}}>Aucun jeu dans ce lot. Utilisez les boutons ci-dessus pour en ajouter.</div>}
        {lotG.map(g=><GCard key={g.id} game={Object.assign({},g,{lotId:''})} lots={[]} onClick={()=>navigate('gd',g.id)} right={<button onClick={e=>{e.stopPropagation();remG(g.id);}} style={{padding:8,color:C.red+'99',flexShrink:0}}><IconMinus size={20}/></button>}/>)}
        <Gap h={16}/>
        <button onClick={()=>setConfirm(true)} style={{width:'100%',background:C.red+'14',border:'1px solid '+C.red+'40',borderRadius:12,padding:13,fontFamily:'Outfit',fontWeight:600,fontSize:14,color:C.red,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}><IconTrash size={16}/> Supprimer ce lot</button>
        {confirm && <div style={{marginTop:10,background:C.red+'12',border:'1px solid '+C.red+'40',borderRadius:12,padding:14}}>
          <div style={{fontFamily:'Outfit',fontSize:13,color:C.text,marginBottom:12,textAlign:'center'}}>Les jeux seront remis en stock.</div>
          <div style={{display:'flex',gap:10}}>
            <button onClick={delLot} style={{flex:1,background:C.red,borderRadius:10,padding:10,fontFamily:'Outfit',fontWeight:600,fontSize:14,color:'#fff'}}>Confirmer</button>
            <button onClick={()=>setConfirm(false)} style={{flex:1,background:C.card2,border:'1px solid '+C.border,borderRadius:10,padding:10,fontFamily:'Outfit',fontSize:14,color:C.muted}}>Annuler</button>
          </div>
        </div>}
      </div>
    </div>
  );
}

/* ─── Bottom Nav ─── */
function Nav({screen,navigate}) {
  const tabs=[{id:'home',label:'Accueil',Icon:IconHome},{id:'inv',label:'Inventaire',Icon:IconList},{id:'add',label:'Ajouter',Icon:IconPlus,acc:true},{id:'lots',label:'Lots',Icon:IconLayers}];
  return (
    <div style={{position:'fixed',bottom:0,left:0,right:0,background:C.card,borderTop:'1px solid '+C.border,display:'flex',padding:'10px 0 18px',zIndex:100}}>
      {tabs.map(({id,label,Icon,acc}) => {
        const active=screen===id;
        return (
          <button key={id} onClick={()=>navigate(id)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
            <div style={{width:42,height:42,display:'flex',alignItems:'center',justifyContent:'center',borderRadius:13,background:acc?(active?C.acc:C.acc2):'transparent'}}>
              <Icon size={20} style={{color:acc?C.acc:(active?C.acc:C.muted)}}/>
            </div>
            <span style={{fontFamily:'Outfit',fontSize:10,fontWeight:500,color:active?C.acc:C.muted}}>{label}</span>
          </button>
        );
      })}
    </div>
  );
}

/* ─── App ─── */
function App() {
  const [data,setData] = useState(() => loadData());
  const [screen,setScreen] = useState('home');
  const [selId,setSelId] = useState(null);
  const updateData = useCallback(d => { setData(d); saveData(d); }, []);
  const navigate = (sc,id) => { setScreen(sc); setSelId(id||null); window.scrollTo(0,0); };
  function handleAddSave(g) {
    const games = data.games||[];
    const exists = games.find(x=>x.id===g.id);
    updateData(Object.assign({},data,{games:exists?games.map(x=>x.id===g.id?g:x):[...games,g]}));
    navigate('inv');
  }
  const noNav = ['add','gd','ld'];
  const p = {data,navigate,selectedId:selId,updateData};
  return (
    <div style={{fontFamily:'Outfit,sans-serif',background:C.bg,minHeight:'100vh',color:C.text}}>
      {screen==='home' && <HomeScreen {...p}/>}
      {screen==='inv'  && <InvScreen {...p}/>}
      {screen==='add'  && <GameForm lots={data.lots||[]} onBack={()=>navigate('inv')} onSave={handleAddSave}/>}
      {screen==='gd'   && <GameDetail {...p}/>}
      {screen==='lots' && <LotsScreen {...p}/>}
      {screen==='ld'   && <LotDetail {...p}/>}
      {!noNav.includes(screen) && <Nav screen={screen} navigate={navigate}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
