function detectPlat(t=''){
  const l=t.toLowerCase();
  const map=[
    ['playstation 5','PS5'],['ps5','PS5'],
    ['playstation 4','PS4'],['ps4','PS4'],
    ['playstation 3','PS3'],['ps3','PS3'],
    ['playstation 2','PS2'],['ps2','PS2'],
    ['xbox series','Xbox Series'],['xbox one','Xbox One'],['xbox 360','Xbox 360'],['xbox','Xbox One'],
    ['nintendo switch','Switch'],['switch','Switch'],
    ['wii u','Wii U'],['wii','Wii'],
    ['nintendo 3ds','3DS'],['3ds','3DS'],
    ['nintendo ds','DS'],[' ds ','DS'],
    ['game boy advance','GBA'],['gba','GBA'],
    ['pc ','PC'],['windows','PC'],['steam','PC'],
  ];
  for(const[k,v]of map)if(l.includes(k))return v;
  return '';
}

function loadData(){
  try {
    const raw=localStorage.getItem(SK);
    const d=raw?JSON.parse(raw):{games:[],lots:[]};
    // Injecter le lot de départ s'il n'existe pas encore
    if(!d.lots.find(l=>l.id===_LID2)||!d.lots.find(l=>l.id===_LID)){
      d.lots=[...SEED.lots,...(d.lots||[])];
      d.games=[...SEED.games,...(d.games||[])];
      localStorage.setItem(SK,JSON.stringify(d));
    }
    return d;
  } catch { return SEED; }
}
function saveData(d){try{localStorage.setItem(SK,JSON.stringify(d))}catch{}}

/* ══════ BARCODE LOOKUP — multi-sources ══════ */
async function upcLookup(code) {
  // Source 1: UPC Item DB
  try {
    const r = await fetch(`https://api.upcitemdb.com/prod/trial/lookup?upc=${code}`, { signal: AbortSignal.timeout(5000) });
    if (r.ok) {
      const d = await r.json();
      if (d.items?.[0]) {
        const i = d.items[0];
        const title = i.title || '';
        if (title) return { title, platform: detectPlat(title), image: i.images?.[0] || '' };
      }
    }
  } catch {}

  // Source 2: Open Food Facts (has some games/entertainment)
  try {
    const r = await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`, { signal: AbortSignal.timeout(5000) });
    if (r.ok) {
      const d = await r.json();
      if (d.status === 1 && d.product?.product_name) {
        const title = d.product.product_name;
        return { title, platform: detectPlat(title), image: d.product.image_url || '' };
      }
    }
  } catch {}

  // Source 3: Open Library (for cases where the EAN is also an ISBN)
  try {
    const r = await fetch(`https://openlibrary.org/api/books?bibkeys=ISBN:${code}&format=json&jscmd=data`, { signal: AbortSignal.timeout(5000) });
    if (r.ok) {
      const d = await r.json();
      const key = `ISBN:${code}`;
      if (d[key]) return { title: d[key].title || '', platform: '', image: d[key].cover?.medium || '' };
    }
  } catch {}

  return null;
}

/* ══════ CSV ══════ */
function exportCSV(games,lots){
  const lm=Object.fromEntries(lots.map(l=>[l.id,l.name]));
  const rows=[['Titre','Plateforme','État','Barcode','Achat','Vente','Port','Frais%','Bénéfice','Statut','Lot'],
    ...games.map(g=>{const inLot=!!g.lotId;const lot=g.lotId?lots.find(l=>l.id===g.lotId):null;return[g.title,g.platform,g.condition,g.barcode,inLot?'(lot)':g.prixAchat,inLot?'(lot)':g.prixVente,inLot?'(lot)':g.fraisPort,inLot?'(lot)':g.tauxFrais,inLot?'voir lot':calcGameProfit(g).toFixed(2),inLot?'En lot':g.status,g.lotId?lm[g.lotId]:'']})]
  ;
  const csv=rows.map(r=>r.map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const url=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));
  Object.assign(document.createElement('a'),{href:url,download:'gametrack.csv'}).click();URL.revokeObjectURL(url);
}

function GameCard({game,lots=[],onClick,rightEl}){
  const inLot=!!game.lotId;const lot=inLot?lots.find(l=>l.id===game.lotId):null;
  const p=inLot?null:calcGameProfit(game);const pc=p==null?C.muted:p>0?C.green:p<0?C.red:C.muted;
  const platC=PLAT_COLORS[game.platform]||'#444';const stC={'Vendu':C.green,'Réservé':C.blue,'En stock':'#555'};
  return(
    <div onClick={onClick} className="gc" style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:'13px 14px 13px 18px',marginBottom:10,cursor:onClick?'pointer':'default',display:'flex',alignItems:'center',gap:12,position:'relative',overflow:'hidden'}}>
      <div style={{position:'absolute',left:0,top:0,bottom:0,width:4,background:platC,borderRadius:'14px 0 0 14px'}}/>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontFamily:'Outfit',fontWeight:600,fontSize:15,color:C.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{game.title||<span style={{color:C.muted,fontStyle:'italic'}}>Sans titre</span>}</div>
        <div style={{display:'flex',gap:8,marginTop:4,alignItems:'center',flexWrap:'wrap'}}>
          {game.platform&&<span style={{fontSize:11,color:C.muted}}>{game.platform}</span>}
          {game.condition&&<span style={{fontSize:11,color:C.muted}}>· {game.condition}</span>}
          {!inLot&&game.status&&<span style={{fontSize:10,padding:'1px 7px',borderRadius:20,background:`${stC[game.status]||'#555'}20`,color:stC[game.status]||C.muted,fontWeight:500}}>{game.status}</span>}
          {inLot&&lot&&<span style={{fontSize:11,color:C.acc}}>📦 {lot.name}</span>}
        </div>
      </div>
      {rightEl||<div style={{textAlign:'right',flexShrink:0}}>
        {inLot?<div style={{fontFamily:'Outfit',fontSize:11,color:C.muted,fontStyle:'italic'}}>Prix au lot</div>
          :<><div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:13,fontWeight:600,color:pc}}>{p>=0?'+':''}{fmt(p)}</div><div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:11,color:C.muted,marginTop:2}}>{fmt(game.prixAchat)}→{fmt(game.prixVente)}</div></>}
      </div>}
    </div>
  );
}
