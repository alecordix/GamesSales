function loadData() {
  try {
    var raw = localStorage.getItem(SK);
    var d = raw ? JSON.parse(raw) : {games:[], lots:[]};
    if (!d.games) d.games = [];
    if (!d.lots) d.lots = [];
    // Migration Sprint1: ajouter sellPlatform si manquant (preserve donnees existantes)
    d.games = d.games.map(function(g){ var g2 = g.sellPlatform !== undefined ? g : Object.assign({}, g, {sellPlatform:''}); return g2.photo !== undefined ? g2 : Object.assign({}, g2, {photo:''}); });
    d.lots  = d.lots.map(function(l){ return l.sellPlatform !== undefined ? l : Object.assign({}, l, {sellPlatform:''}); });
    var changed = false;
    for (var i=0; i<SEED_LOTS.length; i++) {
      var sl = SEED_LOTS[i];
      var found = false;
      for (var j=0; j<d.lots.length; j++) { if (d.lots[j].id === sl.id) { found=true; break; } }
      if (!found) {
        d.lots.unshift(sl);
        var sg = SEED_GAMES.filter(function(g){ return g.lotId === sl.id; });
        for (var k=sg.length-1; k>=0; k--) d.games.unshift(sg[k]);
        changed = true;
      }
    }
    if (changed) localStorage.setItem(SK, JSON.stringify(d));
    return d;
  } catch(e) {
    return {games: SEED_GAMES.slice(), lots: SEED_LOTS.slice()};
  }
}

// ── UPC Lookup ─────────────────────────────────────────────────────
async function upcLookup(code) {
  try {
    var r = await fetch('https://api.upcitemdb.com/prod/trial/lookup?upc=' + code, {signal:AbortSignal.timeout(5000)});
    if (r.ok) {
      var d = await r.json();
      if (d.items && d.items[0] && d.items[0].title) {
        var item = d.items[0];
        return {title: item.title, platform: detectPlat(item.title), image: (item.images && item.images[0]) || ''};
      }
    }
  } catch(e) {}
  return null;
}

    if (TGDB_PLAT_MAP[plats[i]]) return TGDB_PLAT_MAP[plats[i]];
  }
  return '';
}

function getTGDBKey()  { return localStorage.getItem('tgdb-key') || ''; }
function setTGDBKey(k) { localStorage.setItem('tgdb-key', k); }
function getRawgKey()  { return localStorage.getItem('rawg-key') || ''; }
function setRawgKey(k) { localStorage.setItem('rawg-key', k); }

// TheGamesDB — meilleure couverture rétro (PS2, Xbox 360, Wii...)
async function searchTGDB(query, key) {
  try {
    var url = 'https://api.thegamesdb.net/v1/Games/ByGameName'
      + '?apikey=' + encodeURIComponent(key)
      + '&name=' + encodeURIComponent(query)
      + '&fields=platform,release_date,thumb'
      + '&include=boxart'
      + '&page=1';
    var r = await fetch(url, {signal: AbortSignal.timeout(6000)});
    if (!r.ok) return [];
    var d = await r.json();
    if (!d.data || !d.data.games) return [];
    var boxarts = (d.include && d.include.boxart && d.include.boxart.data) || {};
    return d.data.games.slice(0,6).map(function(g) {
      var img = '';
      if (boxarts[g.id] && boxarts[g.id].length) {
        var base = (d.include.boxart.base_url && d.include.boxart.base_url.thumb) || '';
        img = base + boxarts[g.id][0].filename;
      }
      var year = g.release_date ? g.release_date.slice(0,4) : '';
      return {
        title: g.game_title,
        platform: tgdbPlatform(g.platforms || []),
        image: img,
        released: year
      };
    });
  } catch(e) { return []; }
}

// RAWG fallback
async function searchRAWG(query, key) {
  try {
    var url = 'https://api.rawg.io/api/games?search=' + encodeURIComponent(query) + '&page_size=6&key=' + encodeURIComponent(key);
    var r = await fetch(url, {signal: AbortSignal.timeout(5000)});
    if (!r.ok) return [];
    var d = await r.json();
    return (d.results || []).map(function(g) {
      return {title: g.name, platform: rawgPlatform(g.platforms), image: g.background_image || '', released: g.released ? g.released.slice(0,4) : ''};
    });
  } catch(e) { return []; }
}

async function searchGames(query) {
  if (!query || query.length < 2) return [];
  var tgdbKey = getTGDBKey();
  var rawgKey = getRawgKey();
  if (!tgdbKey && !rawgKey) return [];
  if (tgdbKey) {
    var res = await searchTGDB(query, tgdbKey);
    if (res.length > 0) return res;
  }
  if (rawgKey) {
    return await searchRAWG(query, rawgKey);
  }
  return [];
}

function hasAnyKey() { return !!(getTGDBKey() || getRawgKey()); }
function getEbayKey(){ return localStorage.getItem('ebay-key') || ''; }
function setEbayKey(k){ localStorage.setItem('ebay-key', k); }

// eBay Browse API — prix annonces actives sur eBay.fr
// L'API eBay a une restriction CORS : on passe par un proxy CORS public
async function fetchEbayPrices(title, platform) {
  var key = getEbayKey();
  if (!key || !title) return null;
  try {
    var q = title + (platform ? ' ' + platform : '');
    // eBay Browse API endpoint
    var ebayUrl = 'https://api.ebay.com/buy/browse/v1/item_summary/search'
      + '?q=' + encodeURIComponent(q)
      + '&limit=10'
      + '&filter=buyingOptions%3A%7BFIXED_PRICE%7D'
      + '&sort=price';
    // Proxy CORS public (allorigins)
    var proxyUrl = 'https://api.allorigins.win/get?url=' + encodeURIComponent(ebayUrl);
    var r = await fetch(proxyUrl, {
      signal: AbortSignal.timeout(8000)
    });
    if (!r.ok) return null;
    var wrapper = await r.json();
    // allorigins retourne {contents: "...json..."}
    if (!wrapper.contents) return null;
    var d = JSON.parse(wrapper.contents);
    if (!d.itemSummaries || !d.itemSummaries.length) return null;
    var items = d.itemSummaries
      .filter(function(i){ return i.price && i.price.value; })
      .map(function(i){
        return {
          title:  i.title,
          price:  parseFloat(i.price.value).toFixed(2),
          currency: i.price.currency || 'EUR',
          url:    i.itemWebUrl || ''
        };
      });
    if (!items.length) return null;
    var prices = items.map(function(i){ return parseFloat(i.price); });
    var min = Math.min.apply(null, prices).toFixed(2);
    var max = Math.max.apply(null, prices).toFixed(2);
    var avg = (prices.reduce(function(a,b){ return a+b; }, 0) / prices.length).toFixed(2);
    return {items: items.slice(0,5), min: min, max: max, avg: avg, count: items.length};
  } catch(e) { return null; }
}

function exportCSV(games, lots) {
  var lm = {};
  lots.forEach(function(l){ lm[l.id] = l.name; });
  var rows = [['Titre','Plateforme','Etat','Barcode','Achat','Vente','Port','Frais%','Benefice','Statut','Lot']];
  games.forEach(function(g) {
    var il = !!g.lotId;
    rows.push([g.title,g.platform,g.condition,g.barcode,il?'(lot)':g.prixAchat,il?'(lot)':g.prixVente,il?'(lot)':g.fraisPort,il?'(lot)':g.tauxFrais,il?'voir lot':gProfit(g).toFixed(2),il?'En lot':g.status,g.lotId?lm[g.lotId]:'']);
  });
  var csv = rows.map(function(r){ return r.map(function(v){ return '"'+String(v||'').replace(/"/g,'""')+'"'; }).join(','); }).join('\n');
  var url = URL.createObjectURL(new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'}));
  var a = document.createElement('a'); a.href=url; a.download='gametrack.csv'; a.click();
  URL.revokeObjectURL(url);
}

// ── Scanner ────────────────────────────────────────────────────────
function Scanner({onDetect, onClose}) {
  var [st, setSt] = useState('start');
  var [manual, setManual] = useState('');
  var scanRef = useRef(null);
  var done = useRef(false);

  useEffect(function() {
    var timer = setTimeout(async function() {
      try {
        var sc = new Html5Qrcode('gt-scanner', {verbose:false});
        scanRef.current = sc;
        await sc.start(
          {facingMode:'environment'},
          {fps:10, qrbox:{width:Math.min(window.innerWidth-60,280), height:110}},
          function(text) {
            if (done.current) return;
            done.current = true;
            sc.stop().catch(function(){}).finally(function(){ onDetect(text); });
          },
          function(){}
        );
        setSt('ok');
      } catch(e) { setSt('err'); }
    }, 300);
    return function() {
      clearTimeout(timer);
      if (scanRef.current) scanRef.current.stop().catch(function(){});
    };
  }, []);

  function close() { if (scanRef.current) scanRef.current.stop().catch(function(){}); onClose(); }
  function go() { if (!manual.trim()) return; if (scanRef.current) scanRef.current.stop().catch(function(){}); onDetect(manual.trim()); }

  return (
    <div style={{position:'fixed',inset:0,background:'#000',zIndex:400,display:'flex',flexDirection:'column'}}>
      <div style={{padding:'16px 20px',display:'flex',justifyContent:'space-between',alignItems:'center',background:'rgba(10,10,15,.96)',borderBottom:'1px solid #1a1a2e',flexShrink:0}}>

        <button onClick={close} style={{color:C.muted,padding:6,display:'flex'}}><IX size={22} /></button>
      </div>
      <div style={{flex:1,position:'relative',minHeight:0,background:'#111'}}>
        <div id="gt-scanner" style={{width:'100%',height:'100%'}} />
        {st === 'start' && (

            <ILoader size={40} style={{color:C.acc,animation:'spin 1s linear infinite',marginBottom:14}} />
            <div style={{fontFamily:'Outfit',fontSize:14,color:C.muted}}>Demarrage camera...</div>
          </div>
        )}
        {st === 'err' && (
          <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:32,background:'#000',zIndex:5}}>
            <div style={{fontSize:48,marginBottom:16}}>📷</div>
            <div style={{fontFamily:'Outfit',fontWeight:600,fontSize:16,color:C.text,textAlign:'center',marginBottom:8}}>Camera inaccessible</div>

          </div>
        )}
        {st === 'ok' && (
          <div style={{position:'absolute',bottom:14,left:0,right:0,textAlign:'center',zIndex:5,pointerEvents:'none'}}>
            <div style={{display:'inline-block',background:'rgba(0,0,0,.65)',borderRadius:20,padding:'6px 16px',fontFamily:'Outfit',fontSize:13,color:'rgba(255,255,255,.9)'}}>
              Pointez le code-barre dans le cadre
            </div>
          </div>
        )}
      </div>
      <div style={{padding:'16px 20px 32px',background:'rgba(10,10,15,.98)',borderTop:'1px solid #1a1a2e',flexShrink:0}}>
        <Lbl t="SAISIE MANUELLE" />
        <div style={{display:'flex',gap:10}}>
          <input value={manual} onChange={function(e){ setManual(e.target.value); }} onKeyDown={function(e){ if(e.key==='Enter') go(); }}

// ── Notifications Stock Ancien (Sprint 3) ──────────────────────────
function useStockNotifications(data) {
  useEffect(function() {
    if (!('Notification' in window)) return;
    if (Notification.permission === 'denied') return;

    var games = data.games || [];
    var lots  = data.lots  || [];
    var now   = Date.now();
    var DAYS  = 30; // seuil : 30 jours en stock
    var MS    = DAYS * 24 * 60 * 60 * 1000;

    // Jeux individuels en stock depuis trop longtemps
    var old = games.filter(function(g) {
      return !g.lotId
        && g.status === 'En stock'
        && g.createdAt
        && (now - g.createdAt) > MS;
    });

    if (old.length === 0) return;

    // Demander permission si pas encore accordée
    if (Notification.permission === 'default') {
      Notification.requestPermission().then(function(perm) {
        if (perm === 'granted') sendNotif(old);
      });
    } else if (Notification.permission === 'granted') {
      // Ne notifier qu'une fois par session
      var key = 'gt-notif-' + new Date().toDateString();
      if (sessionStorage.getItem(key)) return;
      sessionStorage.setItem(key, '1');
      sendNotif(old);
    }
  }, []);
}

function sendNotif(games) {
  var n = games.length;
  try {
    new Notification('GameTrack - Stock ancien', {
      body: n + ' jeu' + (n > 1 ? 'x' : '') + ' en stock depuis plus de 30 jours. Pensez a les vendre !',
      icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><text y="28" font-size="28">%F0%9F%8E%AE</text></svg>',
      badge: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><text y="28" font-size="28">%F0%9F%8E%AE</text></svg>',
      tag: 'gametrack-stock',
      renotify: false
    });
  } catch(e) {}
}

// ── NotifSettings: panneau dans HomeScreen ─────────────────────────
function NotifBanner({data}) {
  var [perm, setPerm] = useState(
    'Notification' in window ? Notification.permission : 'unsupported'
  );

  var games = data.games || [];
  var now   = Date.now();
  var MS30  = 30 * 24 * 60 * 60 * 1000;
  var oldCount = games.filter(function(g) {
    return !g.lotId && g.status === 'En stock' && g.createdAt && (now - g.createdAt) > MS30;
  }).length;

  function requestPerm() {
    if (!('Notification' in window)) return;
    Notification.requestPermission().then(function(p) {
      setPerm(p);
      if (p === 'granted' && oldCount > 0) sendNotif(games.filter(function(g){
        return !g.lotId && g.status === 'En stock' && g.createdAt && (now - g.createdAt) > MS30;
      }));
    });
  }

  if (perm === 'unsupported') return null;
  if (perm === 'granted' && oldCount === 0) return null;

  var orange = '#f97316';

  if (perm === 'granted' && oldCount > 0) {
    return (
      <div style={{margin:'0 16px 16px',background:'rgba(249,115,22,.10)',border:'1px solid rgba(249,115,22,.35)',borderRadius:12,padding:'12px 14px',display:'flex',alignItems:'center',gap:10}}>
        <span style={{fontSize:20}}>stock</span>
        <div style={{flex:1}}>
          <div style={{fontFamily:'Outfit',fontWeight:600,fontSize:13,color:orange}}>{oldCount} jeu{oldCount>1?'x':''} en stock depuis plus de 30 jours</div>
          <div style={{fontFamily:'Outfit',fontSize:11,color:'#9090b0',marginTop:2}}>Pensez a les mettre en vente !</div>
        </div>
      </div>
    );
  }

  if (perm === 'default') {
    return (
      <div style={{margin:'0 16px 16px',background:'rgba(249,115,22,.08)',border:'1px solid rgba(249,115,22,.25)',borderRadius:12,padding:'12px 14px',display:'flex',alignItems:'center',gap:10}}>
        <span style={{fontSize:20}}>bell</span>
        <div style={{flex:1}}>
          <div style={{fontFamily:'Outfit',fontWeight:600,fontSize:13,color:orange}}>Activer les notifications</div>
          <div style={{fontFamily:'Outfit',fontSize:11,color:'#9090b0',marginTop:2}}>Soyez alerté quand un jeu est en stock depuis trop longtemps</div>
        </div>
        <button onClick={requestPerm} style={{background:orange,borderRadius:8,padding:'7px 12px',color:'#fff',fontFamily:'Outfit',fontWeight:700,fontSize:12,flexShrink:0}}>
          Activer
        </button>
      </div>
    );
  }

  return null;
}

function HomeScreen({data, navigate}) {

  var soldLotIds = new Set(soldLots.map(function(l){ return l.id; }));
  var resvLotIds = new Set(lots.filter(function(l){ return l.status === 'Reserve'; }).map(function(l){ return l.id; }));
  var stockLotIds = new Set(lots.filter(function(l){ return l.status === 'En stock'; }).map(function(l){ return l.id; }));
  var soldSolo = games.filter(function(g){ return g.status === 'Vendu' && !g.lotId; });
  var soldInLots = games.filter(function(g){ return g.lotId && soldLotIds.has(g.lotId); });
  var nbVendus = soldSolo.length + soldInLots.length;
  var nbStock = games.filter(function(g){ return !g.lotId && g.status === 'En stock'; }).length + Array.from(stockLotIds).reduce(function(s,id){ return s + games.filter(function(g){ return g.lotId === id; }).length; }, 0);
  var nbResv = games.filter(function(g){ return !g.lotId && g.status === 'Reserve'; }).length + Array.from(resvLotIds).reduce(function(s,id){ return s + games.filter(function(g){ return g.lotId === id; }).length; }, 0);
  var totalInvesti = games.filter(function(g){ return !g.lotId; }).reduce(function(s,g){ return s+parseFloat(g.prixAchat||0); }, 0) + lots.reduce(function(s,l){ return s+parseFloat(l.prixAchat||0); }, 0);
  var totalRevenus = soldSolo.reduce(function(s,g){ return s+parseFloat(g.prixVente||0); }, 0) + soldLots.reduce(function(s,l){ return s+parseFloat(l.prixVente||0); }, 0);
  var totalBenef = totalRevenus - totalInvesti;
  var totalPotentiel = games.filter(function(g){ return !g.lotId; }).reduce(function(s,g){ return s+parseFloat(g.prixVente||0); }, 0) + lots.reduce(function(s,l){ return s+parseFloat(l.prixVente||0); }, 0);

        <div style={{fontFamily:'Outfit',fontSize:13,color:C.muted,marginBottom:16}}>Suivi revente jeux video</div>
        <div style={{display:'flex',gap:8}}>
          {[{l:'En stock',v:nbStock,col:C.blue},{l:'Reserve',v:nbResv,col:C.acc},{l:'Vendus',v:nbVendus,col:C.green}].map(function(item){
            return (
              <div key={item.l} style={{flex:1,background:item.col+'18',border:'1px solid '+item.col+'40',borderRadius:12,padding:'10px 12px',textAlign:'center'}}>
                <div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:22,fontWeight:600,color:item.col}}>{item.v}</div>
                <div style={{fontFamily:'Outfit',fontSize:10,color:item.col+'cc',marginTop:2,fontWeight:500}}>{item.l}</div>
              </div>
            );
          })}
        </div>
      </div>

      <div style={{padding:'12px 16px 0',display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        {[{l:'INVESTI',v:fmt(totalInvesti)},{l:'REVENUS ENCAISSES',v:fmt(totalRevenus)},{l:'BENEFICE ACTUEL',v:fmt(totalBenef),col:totalBenef>=0?C.green:C.red}].map(function(item){
          return (
            <div key={item.l} style={{background:C.card2,border:'1px solid '+C.border,borderRadius:14,padding:'12px 14px'}}>
              <div style={{fontFamily:'Outfit',fontSize:9,color:C.muted,letterSpacing:.8,marginBottom:6,fontWeight:500}}>{item.l}</div>
              <div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:15,fontWeight:600,color:item.col||C.text}}>{item.v}</div>
            </div>

      <div style={{padding:'10px 16px 20px'}}>
        <div style={{background:'linear-gradient(135deg,'+C.acc+'15,'+C.acc+'05)',border:'1px solid '+C.acc+'35',borderRadius:14,padding:'13px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{fontFamily:'Outfit',fontSize:9,color:C.acc+'99',letterSpacing:.8,marginBottom:4,fontWeight:500}}>POTENTIEL GLOBAL (tous statuts)</div>
            <div style={{fontFamily:'Outfit',fontSize:11,color:C.muted}}>Somme prix vente lots + jeux individuels</div>
          </div>
          <div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:20,fontWeight:600,color:C.acc,flexShrink:0,marginLeft:12}}>{fmt(totalPotentiel)}</div>

    if (q && !(g.title||'').toLowerCase().includes(q.toLowerCase()) && !(g.platform||'').toLowerCase().includes(q.toLowerCase())) return false;

    if (pf  && g.platform !== pf) return false;
    if (spf && (g.sellPlatform||'') !== spf) return false;

  });

  var sellPlatforms = Array.from(new Set(games.map(function(g){ return g.sellPlatform; }).filter(Boolean)));

              <div style={{flex:1,minWidth:100}}>
                <div style={{fontFamily:'Outfit',fontSize:10,color:C.muted,marginBottom:4}}>STATUT</div>

                    <button key={s} onClick={function(){setSf(s);}} style={{padding:'3px 8px',borderRadius:16,fontFamily:'Outfit',fontSize:11,background:sf===s?C.acc:C.card2,color:sf===s?'#000':C.muted,border:'1px solid '+(sf===s?C.acc:C.border)}}>{s||'Tous'}</button>

                    {platforms.map(function(p){return(
                      <button key={p} onClick={function(){setPf(pf===p?'':p);}} style={{padding:'3px 8px',borderRadius:16,fontFamily:'Outfit',fontSize:11,background:pf===p?C.acc:C.card2,color:pf===p?'#000':C.muted,border:'1px solid '+(pf===p?C.acc:C.border)}}>{p}</button>
                    );}) }
                  </div>
                </div>

                    {sellPlatforms.map(function(sp){var col=SELL_COLORS[sp]||C.muted;return(
                      <button key={sp} onClick={function(){setSpf(spf===sp?'':sp);}} style={{padding:'3px 8px',borderRadius:16,fontFamily:'Outfit',fontSize:11,background:spf===sp?col:C.card2,color:spf===sp?'#fff':C.muted,border:'1px solid '+(spf===sp?col:C.border)}}>{sp}</button>
                    );}) }

      </div>
      <div style={{padding:'10px 16px'}}>
        <div style={{fontFamily:'Outfit',fontSize:12,color:C.muted,marginBottom:10}}>{filtered.length} jeu{filtered.length!==1?'x':''}</div>
        {filtered.length === 0
          ? <div style={{textAlign:'center',padding:'44px 0',color:C.muted,fontFamily:'Outfit'}}>Aucun resultat</div>
          : filtered.map(function(g){ return <GCard key={g.id} game={g} lots={lots} onClick={function(){ navigate('gd',g.id); }} onQuickEdit={function(ch){ quickEdit(g.id,ch); }}/>; })
        }
      </div>
    </div>
  );
}
// ── Game Form ──────────────────────────────────────────────────────
function emptyGame() {
  return {id:'',barcode:'',title:'',platform:'',condition:'',prixAchat:'',prixVente:'',fraisPort:'',tauxFrais:'',status:'En stock',lotId:'',notes:'',image:'',createdAt:ts()};
}

function GameForm({init, lots, onSave, onBack}) {
  lots = lots || [];
  var [g, setG] = useState(Object.assign(emptyGame(), init || {}));
  var [scanning, setScanning] = useState(false);
  var [lkSt, setLkSt] = useState('idle');
  var [toast, setToast] = useState({msg:'',type:'info'});

  function upd(k, v) { setG(function(prev){ return Object.assign({},prev,{[k]:v}); }); }
  function showT(msg, type) { setToast({msg:msg,type:type||'info'}); setTimeout(function(){ setToast({msg:'',type:'info'}); }, 3500); }

  var il = !!g.lotId;

  async function handleCode(code) {
    setScanning(false);
    upd('barcode', code);
    setLkSt('loading');
    showT('Recherche du jeu...');
    var info = await upcLookup(code);
    if (info && info.title) {
      setG(function(prev){ return Object.assign({},prev,{barcode:code,title:info.title,platform:info.platform||prev.platform,image:info.image||prev.image}); });
      setLkSt('ok');
      showT('Jeu trouve !', 'ok');
    } else {
      setLkSt('err');
      showT('Non trouve - remplissez manuellement', 'err');
    }
  }

  var profit = il ? null : gProfit(g);
  var pc = profit == null ? C.muted : profit > 0 ? C.green : profit < 0 ? C.red : C.muted;

  function save() {
    if (!g.title.trim()) { showT('Titre requis', 'err'); return; }
    onSave(Object.assign({}, g, {id: g.id || uid()}));
  }

  return (
    <div style={{paddingBottom:40}} className="su">
      {scanning && <Scanner onDetect={handleCode} onClose={function(){ setScanning(false); }} />}
      <Toast msg={toast.msg} type={toast.type} />
      <div style={{padding:'28px 16px 20px',background:'linear-gradient(170deg,'+C.card+' 0%,'+C.bg+' 100%)'}}>
        <button onClick={onBack} style={{display:'flex',alignItems:'center',gap:6,color:C.muted,fontFamily:'Outfit',fontSize:13,marginBottom:14}}>
          <ILeft size={15} /> Retour
        </button>
        <div style={{fontFamily:'Syne,sans-serif',fontSize:22,fontWeight:800,color:C.text}}>{g.id ? 'Modifier' : 'Ajouter un jeu'}</div>
      </div>
      <div style={{padding:'0 16px'}}>
        <button onClick={function(){ setScanning(true); }} style={{width:'100%',background:lkSt==='ok'?C.green+'18':C.acc2,border:'1.5px solid '+(lkSt==='ok'?C.green:C.acc)+'50',borderRadius:14,padding:15,display:'flex',alignItems:'center',justifyContent:'center',gap:10,marginBottom:16,fontFamily:'Outfit',fontWeight:600,fontSize:15,color:lkSt==='ok'?C.green:C.acc}}>
          {lkSt === 'loading' ? <ILoader size={18} style={{animation:'spin 1s linear infinite'}} /> : lkSt === 'ok' ? <ICheck size={18} /> : <ICam size={18} />}
          {lkSt === 'loading' ? 'Recherche...' : lkSt === 'ok' ? 'Trouve ! (re-scanner)' : 'Scanner le code-barre'}
        </button>

        {g.barcode && (
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14,background:C.card2,borderRadius:10,padding:'8px 12px'}}>
            {g.image && <img src={g.image} alt="" style={{width:44,height:44,borderRadius:6,objectFit:'contain',background:'#fff'}} />}
            <div>
              <div style={{fontFamily:'Outfit',fontSize:11,color:C.muted}}>Code scanne</div>
              <div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:13,color:C.text}}>{g.barcode}</div>
            </div>
          </div>
        )}

        <Lbl t="TITRE *" />
        <TitleInput
          value={g.title}
          onChange={function(v){ upd('title',v); }}
          onSelect={function(s){ setG(function(prev){ return Object.assign({},prev,{title:s.title,platform:s.platform||prev.platform,image:s.image||prev.image}); }); setLkSt('idle'); }}
        />
        <Gap />
        <MarketPriceWidget title={g.title} platform={g.platform}/>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
          <div>
            <Lbl t="PLATEFORME" />
            <Sel value={g.platform} onChange={function(v){ upd('platform',v); }}>
              <option value="">Choisir...</option>
              {PLATS.map(function(p){ return <option key={p} value={p}>{p}</option>; })}
            </Sel>
          </div>
          <div>
            <Lbl t="ETAT" />
            <Sel value={g.condition} onChange={function(v){ upd('condition',v); }}>
              <option value="">Choisir...</option>
              {CONDS.map(function(c){ return <option key={c} value={c}>{c}</option>; })}
            </Sel>
          </div>
        </div>

        <div style={{background:C.card2,border:'1px solid '+C.border,borderRadius:14,padding:16,marginBottom:14}}>
          <Lbl t="LOT" />
          <Sel value={g.lotId} onChange={function(v){ upd('lotId',v); }}>
            <option value="">Aucun lot (prix individuels)</option>
            {lots.map(function(l){ return <option key={l.id} value={l.id}>Lot: {l.name}</option>; })}
          </Sel>
          {il && <div style={{fontFamily:'Outfit',fontSize:12,color:C.acc,marginTop:8}}>Prix geres au niveau du lot</div>}
        </div>

        {!il && (
          <div style={{background:C.card2,border:'1px solid '+C.border,borderRadius:14,padding:16,marginBottom:14}}>
            <Lbl t="PRIX ET FRAIS" />
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
              <div><Lbl t="Achat (EUR)" /><Inp value={g.prixAchat} onChange={function(v){ upd('prixAchat',v); }} placeholder="0.00" type="number" mono={true} /></div>
              <div><Lbl t="Vente (EUR)" /><Inp value={g.prixVente} onChange={function(v){ upd('prixVente',v); }} placeholder="0.00" type="number" mono={true} /></div>
              <div><Lbl t="Port (EUR)" /><Inp value={g.fraisPort} onChange={function(v){ upd('fraisPort',v); }} placeholder="0.00" type="number" mono={true} /></div>
              <div><Lbl t="Frais % (eBay=13)" /><Inp value={g.tauxFrais} onChange={function(v){ upd('tauxFrais',v); }} placeholder="0" type="number" mono={true} /></div>
            </div>
            <div style={{background:C.bg,borderRadius:10,padding:'10px 14px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontFamily:'Outfit',fontSize:13,color:C.muted}}>Benefice estime</span>
              <span style={{fontFamily:'"JetBrains Mono",monospace',fontSize:18,fontWeight:600,color:pc}}>{profit >= 0 ? '+' : ''}{fmt(profit)}</span>
            </div>
          </div>
        )}

        {!il && (
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
            <div>
              <Lbl t="STATUT" />
              <Sel value={g.status} onChange={function(v){ upd('status',v); }}>
                {STATS.map(function(s){ return <option key={s} value={s}>{s}</option>; })}
              </Sel>
            </div>
            <div>
              <Lbl t="VENDU SUR" />
              <Sel value={g.sellPlatform||''} onChange={function(v){ upd('sellPlatform',v); }}>
                {SELL_PLATS.map(function(p){ return <option key={p} value={p}>{p||'Aucune'}</option>; })}
              </Sel>
            </div>
          </div>
        )}

        <Lbl t="NOTES" />
        <textarea value={g.notes} onChange={function(e){ upd('notes',e.target.value); }} placeholder="Griffures, manquants..."
          style={{width:'100%',background:C.card2,border:'1px solid '+C.border,borderRadius:10,padding:'11px 14px',color:C.text,fontFamily:'Outfit',fontSize:14,resize:'vertical',minHeight:72,outline:'none',marginBottom:20}} />

        <button onClick={save} style={{width:'100%',background:C.acc,borderRadius:14,padding:15,fontFamily:'Outfit',fontWeight:700,fontSize:16,color:'#000',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
          <ICheck size={18} /> {g.id ? 'Enregistrer' : 'Ajouter le jeu'}
        </button>
      </div>
    </div>
  );
}

// ── Game Detail ────────────────────────────────────────────────────
function GameDetail({data, selectedId, navigate, updateData}) {
  var games = data.games || [];
  var lots = data.lots || [];
  var game = games.find(function(g){ return g.id === selectedId; });
  var [editing, setEditing] = useState(false);
  var [confirm, setConfirm] = useState(false);

  if (!game) return <div style={{padding:48,textAlign:'center',color:C.muted,fontFamily:'Outfit'}}>Jeu introuvable</div>;
  if (editing) return <GameForm init={game} lots={lots} onBack={function(){ setEditing(false); }} onSave={function(g){ updateData(Object.assign({},data,{games:games.map(function(x){ return x.id===g.id?g:x; })})); setEditing(false); }} />;

  var il = !!game.lotId;
  var lot = il ? lots.find(function(l){ return l.id === game.lotId; }) : null;
  var p = il ? null : gProfit(game);
  var pc = p == null ? C.muted : p > 0 ? C.green : p < 0 ? C.red : C.muted;
  var platC = PLAT_COLORS[game.platform] || '#444';

  return (
    <div style={{paddingBottom:40}} className="su">
      <div style={{padding:'28px 16px 20px',background:'linear-gradient(170deg,'+C.card+' 0%,'+C.bg+' 100%)'}}>
        <button onClick={function(){ navigate('inv'); }} style={{display:'flex',alignItems:'center',gap:6,color:C.muted,fontFamily:'Outfit',fontSize:13,marginBottom:14}}>
          <ILeft size={15} /> Inventaire
        </button>
        {game.platform && <div style={{display:'inline-block',padding:'3px 10px',borderRadius:20,background:platC+'25',color:platC,fontFamily:'Outfit',fontSize:12,fontWeight:600,marginBottom:8}}>{game.platform}</div>}
        <div style={{fontFamily:'Syne,sans-serif',fontSize:22,fontWeight:800,color:C.text,lineHeight:1.2}}>{game.title || 'Sans titre'}</div>
        {game.condition && <div style={{fontFamily:'Outfit',fontSize:13,color:C.muted,marginTop:4}}>{game.condition}</div>}
        {game.sellPlatform && <div style={{marginTop:8}}><SellBadge platform={game.sellPlatform}/></div>}
      </div>
      <div style={{padding:'0 16px'}}>
        {game.image && <div style={{textAlign:'center',marginBottom:14}}><img src={game.image} alt="" style={{maxHeight:100,maxWidth:170,borderRadius:10,objectFit:'contain',background:'#fff',padding:4}} /></div>}
        {!il && <MarketPriceWidget title={game.title} platform={game.platform}/>}
        {il && lot
          ? <div onClick={function(){ navigate('ld',lot.id); }} style={{background:C.acc2,border:'1px solid '+C.acc+'40',borderRadius:16,padding:'14px 16px',marginBottom:14,cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div>
                <div style={{fontFamily:'Outfit',fontSize:11,color:C.muted,marginBottom:4}}>DANS LE LOT</div>
                <div style={{fontFamily:'Outfit',fontWeight:600,fontSize:16,color:C.acc}}>📦 {lot.name}</div>
                <div style={{fontFamily:'Outfit',fontSize:12,color:C.muted,marginTop:2}}>Prix geres au niveau du lot</div>
              </div>
              <div style={{color:C.acc,fontSize:22}}>&rsaquo;</div>
            </div>
          : <div style={{background:'linear-gradient(135deg,'+pc+'18,'+pc+'06)',border:'1px solid '+pc+'35',borderRadius:16,padding:20,marginBottom:14,textAlign:'center'}}>
              <div style={{fontFamily:'Outfit',fontSize:11,color:C.muted,marginBottom:6,letterSpacing:.8}}>BENEFICE NET</div>
              <div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:38,fontWeight:600,color:pc}}>{p >= 0 ? '+' : ''}{fmt(p)}</div>
            </div>
        }
        <div style={{background:C.card2,border:'1px solid '+C.border,borderRadius:14,padding:'4px 16px',marginBottom:14}}>
          {!il && [["Prix achat",fmt(game.prixAchat)],["Prix vente",fmt(game.prixVente)],["Frais port",fmt(game.fraisPort)],["Frais plat.",(game.tauxFrais||'0')+'%'],["Statut",game.status]].map(function(row){
            return <div key={row[0]} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:'1px solid '+C.border}}><span style={{fontFamily:'Outfit',fontSize:13,color:C.muted}}>{row[0]}</span><span style={{fontFamily:'"JetBrains Mono",monospace',fontSize:13,color:C.text}}>{row[1]}</span></div>;
          })}
          {game.barcode && <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0'}}><span style={{fontFamily:'Outfit',fontSize:13,color:C.muted}}>Code-barre</span><span style={{fontFamily:'"JetBrains Mono",monospace',fontSize:12,color:C.text}}>{game.barcode}</span></div>}
        </div>
        {game.notes && <div style={{background:C.card2,border:'1px solid '+C.border,borderRadius:14,padding:'12px 14px',marginBottom:14}}><div style={{fontFamily:'Outfit',fontSize:10,color:C.muted,marginBottom:5}}>NOTES</div><div style={{fontFamily:'Outfit',fontSize:14,color:C.text,lineHeight:1.55}}>{game.notes}</div></div>}
        <div style={{display:'flex',gap:10}}>
          <button onClick={function(){ setEditing(true); }} style={{flex:1,background:C.acc,borderRadius:12,padding:13,fontFamily:'Outfit',fontWeight:700,fontSize:15,color:'#000',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
            <IEdit size={16} /> Modifier
          </button>
          <button onClick={function(){ setConfirm(true); }} style={{background:C.red+'18',border:'1px solid '+C.red+'40',borderRadius:12,padding:'13px 16px',color:C.red}}>
            <ITrash size={18} />
          </button>
        </div>
        {confirm && (
          <div style={{marginTop:12,background:C.red+'13',border:'1px solid '+C.red+'40',borderRadius:12,padding:14}}>
            <div style={{fontFamily:'Outfit',fontSize:14,color:C.text,marginBottom:12,textAlign:'center'}}>Supprimer ce jeu ?</div>
            <div style={{display:'flex',gap:10}}>
              <button onClick={function(){ updateData(Object.assign({},data,{games:games.filter(function(g){ return g.id!==selectedId; })})); navigate('inv'); }} style={{flex:1,background:C.red,borderRadius:10,padding:10,fontFamily:'Outfit',fontWeight:600,fontSize:14,color:'#fff'}}>Supprimer</button>
              <button onClick={function(){ setConfirm(false); }} style={{flex:1,background:C.card2,border:'1px solid '+C.border,borderRadius:10,padding:10,fontFamily:'Outfit',fontSize:14,color:C.muted}}>Annuler</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Game Picker ────────────────────────────────────────────────────
function GPicker({games, selected, onToggle}) {

// ── Stats Screen (Sprint 1) ────────────────────────────────────────
function StatsScreen({data}) {
  var games = data.games || [];
  var lots  = data.lots  || [];
  var soldLots   = lots.filter(function(l){ return l.status === 'Vendu'; });
  var soldLotIds = new Set(soldLots.map(function(l){ return l.id; }));
  var soldSolo   = games.filter(function(g){ return g.status === 'Vendu' && !g.lotId; });
  var soldInLots = games.filter(function(g){ return g.lotId && soldLotIds.has(g.lotId); });

  // Benefice par plateforme console
  var byPlat = {};
  games.filter(function(g){ return !g.lotId; }).forEach(function(g) {
    var pl = g.platform || 'Autre';
    if (!byPlat[pl]) byPlat[pl] = {profit:0, count:0, sold:0};
    byPlat[pl].count++;
    if (g.status === 'Vendu') { byPlat[pl].profit += gProfit(g); byPlat[pl].sold++; }
  });
  var platStats = Object.keys(byPlat).map(function(k){
    return {name:k, profit:byPlat[k].profit, count:byPlat[k].count, sold:byPlat[k].sold};
  }).sort(function(a,b){ return b.profit - a.profit; });

  // Benefice par plateforme de vente
  var bySell = {};
  soldSolo.filter(function(g){ return g.sellPlatform; }).forEach(function(g) {
    var sp = g.sellPlatform;
    if (!bySell[sp]) bySell[sp] = {profit:0, count:0};
    bySell[sp].profit += gProfit(g); bySell[sp].count++;
  });
  soldLots.filter(function(l){ return l.sellPlatform; }).forEach(function(l) {
    var sp = l.sellPlatform;
    if (!bySell[sp]) bySell[sp] = {profit:0, count:0};
    bySell[sp].profit += lProfit(l); bySell[sp].count++;
  });

  var totalSolo = soldSolo.reduce(function(s,g){ return s + gProfit(g); }, 0);
  var avgProfit = soldSolo.length > 0 ? (totalSolo / soldSolo.length) : 0;

  // Historique mensuel
  var monthly = {};
  soldSolo.forEach(function(g){ if(g.createdAt){ var k=monthKey(g.createdAt); if(!monthly[k])monthly[k]=0; monthly[k]+=gProfit(g); } });
  soldLots.forEach(function(l){ if(l.createdAt){ var k=monthKey(l.createdAt); if(!monthly[k])monthly[k]=0; monthly[k]+=lProfit(l); } });
  var months = Object.keys(monthly).sort();

  var chartRef  = useRef(null);
  var chartInst = useRef(null);
  useEffect(function() {
    if (!chartRef.current || months.length === 0) return;
    if (chartInst.current) chartInst.current.destroy();
    chartInst.current = new Chart(chartRef.current, {
      type: 'bar',
      data: {
        labels: months.map(monthLabel),
        datasets: [{label:'Benefice',data:months.map(function(m){ return monthly[m].toFixed(2); }),backgroundColor:'rgba(245,166,35,.7)',borderColor:'#f5a623',borderWidth:1,borderRadius:6}]
      },
      options: {responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:C.muted,font:{size:11}},grid:{color:'#252538'}},y:{ticks:{color:C.muted,font:{size:11}},grid:{color:'#252538'}}}}
    });
    return function(){ if (chartInst.current) chartInst.current.destroy(); };
  }, [months.join(',')]);

  var noData = platStats.length === 0 && months.length === 0;

  return (
    <div style={{paddingBottom:90}} className="su">
      <div style={{padding:'28px 16px 20px',background:'linear-gradient(170deg,'+C.card+' 0%,'+C.bg+' 100%)'}}>
        <div style={{fontFamily:'Syne,sans-serif',fontSize:22,fontWeight:800,color:C.text}}>Statistiques</div>
        <div style={{fontFamily:'Outfit',fontSize:13,color:C.muted,marginTop:2}}>Analyse de tes ventes</div>
      </div>
      <div style={{padding:'0 16px'}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:20}}>
          {[
            {l:'Benefice moyen / jeu', v:fmt(avgProfit), col:avgProfit>=0?C.green:C.red},
            {l:'Jeux vendus',          v:''+soldSolo.length,                    col:C.text},
            {l:'Lots vendus',          v:''+soldLots.length,                    col:C.text},
            {l:'Total vendus',         v:''+(soldSolo.length+soldInLots.length), col:C.text}
          ].map(function(item){ return (
            <div key={item.l} style={{background:C.card2,border:'1px solid '+C.border,borderRadius:14,padding:'13px 14px'}}>
              <div style={{fontFamily:'Outfit',fontSize:10,color:C.muted,letterSpacing:.7,marginBottom:6,fontWeight:500}}>{item.l}</div>
              <div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:20,fontWeight:600,color:item.col}}>{item.v}</div>
            </div>
          ); })}
        </div>

        {months.length > 0 && (
          <div style={{background:C.card2,border:'1px solid '+C.border,borderRadius:14,padding:'14px',marginBottom:20}}>
            <div style={{fontFamily:'Syne,sans-serif',fontSize:15,fontWeight:700,color:C.text,marginBottom:12}}>Benefices par mois</div>
            <div style={{height:160}}><canvas ref={chartRef}/></div>
          </div>
        )}

        {platStats.length > 0 && (
          <div style={{background:C.card2,border:'1px solid '+C.border,borderRadius:14,padding:'14px',marginBottom:20}}>
            <div style={{fontFamily:'Syne,sans-serif',fontSize:15,fontWeight:700,color:C.text,marginBottom:12}}>Performance par plateforme</div>
            {platStats.map(function(ps){ var col = PLAT_COLORS[ps.name]||'#444'; return (
              <div key={ps.name} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:'1px solid '+C.border}}>
                <div style={{width:10,height:10,borderRadius:'50%',background:col,flexShrink:0}}/>
                <div style={{flex:1,fontFamily:'Outfit',fontSize:13,color:C.text}}>{ps.name}</div>
                <div style={{fontFamily:'Outfit',fontSize:11,color:C.muted}}>{ps.sold}/{ps.count}</div>
                <div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:13,fontWeight:600,color:ps.profit>=0?C.green:C.red,minWidth:72,textAlign:'right'}}>{ps.profit>=0?'+':''}{fmt(ps.profit)}</div>
              </div>
            ); })}
          </div>
        )}

        {Object.keys(bySell).length > 0 && (
          <div style={{background:C.card2,border:'1px solid '+C.border,borderRadius:14,padding:'14px',marginBottom:20}}>
            <div style={{fontFamily:'Syne,sans-serif',fontSize:15,fontWeight:700,color:C.text,marginBottom:12}}>Performance par plateforme de vente</div>
            {Object.keys(bySell).map(function(sp){ var col = SELL_COLORS[sp]||C.muted; return (
              <div key={sp} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:'1px solid '+C.border}}>
                <div style={{width:10,height:10,borderRadius:'50%',background:col,flexShrink:0}}/>
                <div style={{flex:1,fontFamily:'Outfit',fontWeight:600,fontSize:13,color:col}}>{sp}</div>
                <div style={{fontFamily:'Outfit',fontSize:11,color:C.muted}}>{bySell[sp].count} vente{bySell[sp].count>1?'s':''}</div>
                <div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:13,fontWeight:600,color:bySell[sp].profit>=0?C.green:C.red,minWidth:72,textAlign:'right'}}>{bySell[sp].profit>=0?'+':''}{fmt(bySell[sp].profit)}</div>
              </div>
            ); })}
          </div>
        )}

        {noData && (
          <div style={{textAlign:'center',padding:'60px 0',color:C.muted,fontFamily:'Outfit',fontSize:14}}>
            Pas encore de donnees. Commencez a vendre des jeux !
          </div>
        )}
      </div>
    </div>
  );
}

// helpers stats
function monthKey(ms){ var d=new Date(ms); return d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0'); }
function monthLabel(k){ var p=k.split('-'); var m=['Jan','Fev','Mar','Avr','Mai','Jun','Jul','Aou','Sep','Oct','Nov','Dec']; return m[parseInt(p[1])-1]+' '+p[0].slice(2); }

// ── Bottom Nav ─────────────────────────────────────────────────────
function Nav({screen, navigate}) {
  var tabs = [
    {id:'home',  label:'Accueil',    Icon:IHome},
    {id:'inv',   label:'Inventaire', Icon:IList},
    {id:'add',   label:'Ajouter',    Icon:IPlus, acc:true},
    {id:'stats', label:'Stats',      Icon:IStats},
    {id:'lots',  label:'Lots',       Icon:ILayers}
  ];
  return (
    <div style={{position:'fixed',bottom:0,left:0,right:0,background:C.card,borderTop:'1px solid '+C.border,display:'flex',padding:'10px 0 18px',zIndex:100}}>
      {tabs.map(function(tab) {
        var active = screen === tab.id;
        return (
          <button key={tab.id} onClick={function(){ navigate(tab.id); }} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
            <div style={{width:42,height:42,display:'flex',alignItems:'center',justifyContent:'center',borderRadius:13,background:tab.acc?(active?C.acc:C.acc2):'transparent'}}>
              <tab.Icon size={20} style={{color:tab.acc?C.acc:(active?C.acc:C.muted)}} />
            </div>
            <span style={{fontFamily:'Outfit',fontSize:10,fontWeight:500,color:active?C.acc:C.muted}}>{tab.label}</span>
          </button>
        );
      })}
    </div>
  );
}

// ── App ────────────────────────────────────────────────────────────
function App() {
  var [data, setData] = useState(function(){ return loadData(); });
  var [screen, setScreen] = useState('home');
  var [selId, setSelId] = useState(null);
  var updateData = useCallback(function(d){ setData(d); saveData(d); }, []);
  function navigate(sc, id) { setScreen(sc); setSelId(id||null); window.scrollTo(0,0); }
  function handleAddSave(g) {
    var games = data.games || [];
    var exists = games.find(function(x){ return x.id === g.id; });
    updateData(Object.assign({},data,{games: exists ? games.map(function(x){ return x.id===g.id?g:x; }) : [...games,g]}));
    navigate('inv');
  }
  var noNav = ['add','gd','ld'];
  var props = {data:data, navigate:navigate, selectedId:selId, updateData:updateData};
  return (
    <div style={{fontFamily:'Outfit,sans-serif',background:C.bg,minHeight:'100vh',color:C.text}}>
      {screen === 'home'  && <HomeScreen data={data} navigate={navigate} />}
      {screen === 'inv'  && <InvScreen data={data} navigate={navigate} updateData={updateData}/>}
      {screen === 'add'  && <GameForm lots={data.lots||[]} onBack={function(){ navigate('inv'); }} onSave={handleAddSave} />}
      {screen === 'gd'   && <GameDetail data={data} selectedId={selId} navigate={navigate} updateData={updateData} />}
      {screen === 'stats' && <StatsScreen data={data}/>}
      {screen === 'lots' && <LotsScreen data={data} navigate={navigate} updateData={updateData} />}
      {screen === 'ld'   && <LotDetail data={data} selectedId={selId} navigate={navigate} updateData={updateData} />}
      {!noNav.includes(screen) && <Nav screen={screen} navigate={navigate} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>

<script>
// ── Service Worker (PWA offline) ───────────────────────────────────
(function() {
  if (!('serviceWorker' in navigator)) return;

  var CACHE = 'gametrack-v1';
  var ASSETS = [
    './',
    'https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@500;600&family=Outfit:wght@400;500;600;700&display=swap',
    'https://unpkg.com/react@18/umd/react.production.min.js',
    'https://unpkg.com/react-dom@18/umd/react-dom.production.min.js',
    'https://unpkg.com/@babel/standalone/babel.min.js',
    'https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js',
    'https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js'
  ];

  var swCode = [
    "var CACHE='" + CACHE + "';",
    "var ASSETS=" + JSON.stringify(ASSETS) + ";",
    "self.addEventListener('install',function(e){",
    "  e.waitUntil(caches.open(CACHE).then(function(c){",
    "    return Promise.allSettled(ASSETS.map(function(u){return c.add(u).catch(function(){});}));",
    "  }).then(function(){return self.skipWaiting();}));",
    "});",
    "self.addEventListener('activate',function(e){",
    "  e.waitUntil(caches.keys().then(function(keys){",
    "    return Promise.all(keys.filter(function(k){return k!==CACHE;}).map(function(k){return caches.delete(k);}));",
    "  }).then(function(){return self.clients.claim();}));",
    "});",
    "self.addEventListener('fetch',function(e){",
    "  if(e.request.method!=='GET')return;",
    "  e.respondWith(caches.match(e.request).then(function(cached){",
    "    if(cached)return cached;",
    "    return fetch(e.request).then(function(r){",
    "      if(r&&r.status===200&&r.type!=='opaque'){",
    "        var cl=r.clone();",
    "        caches.open(CACHE).then(function(c){c.put(e.request,cl);});",
    "      }",
    "      return r;",
    "    }).catch(function(){return cached||new Response('Offline',{status:503});});",
    "  }));",
    "});"
  ].join('\n');

  var blob = new Blob([swCode], {type: 'application/javascript'});
  var swUrl = URL.createObjectURL(blob);

  navigator.serviceWorker.register(swUrl, {scope: './'})
    .then(function(reg) {
      console.log('[GameTrack] SW registered, scope:', reg.scope);
    })
    .catch(function(err) {
      console.warn('[GameTrack] SW registration failed:', err);
    });
})();
</script>
